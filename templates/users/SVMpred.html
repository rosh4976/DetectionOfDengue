<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SVM Dataset Entry Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <h2 class="mb-4 text-center">Dengue Prediction</h2>

    <form method="post" action="/myapp/SVMpred_post/">
        {% csrf_token %}

        <!-- Gender -->
        <div class="mb-3">
            <label class="form-label">Gender</label>
            <select class="form-control" name="gender" required>
                <option value="">Select</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
            </select>
        </div>

        <!-- Age -->
        <div class="mb-3">
            <label class="form-label">Age</label>
            <input type="number" class="form-control" name="age" min="0" required>
        </div>

        <!-- NS1 -->
        <div class="mb-3">
            <label class="form-label">NS1</label>
            <select class="form-control" name="ns1" required>
                <option value="">Select</option>
                <option value="1">Positive (1)</option>
                <option value="0">Negative (0)</option>
            </select>
        </div>

        <!-- IgG -->
        <div class="mb-3">
            <label class="form-label">IgG</label>
            <select class="form-control" name="igg" required>
                <option value="1">Positive (1)</option>
                <option value="0">Negative (0)</option>
            </select>
        </div>

        <!-- IgM -->
        <div class="mb-3">
            <label class="form-label">IgM</label>
            <select class="form-control" name="igm" required>
                <option value="1">Positive (1)</option>
                <option value="0">Negative (0)</option>
            </select>
        </div>

        <!-- Area -->
        <div class="mb-3">
            <input type="text" class="form-control" name="area" placeholder="Area" required>
        </div>

        <!-- Area Type -->
        <div class="mb-3">
            <select class="form-control" name="areatype" required>
                <option value="Developed">Developed</option>
                <option value="Undeveloped">Undeveloped</option>
            </select>
        </div>

        <!-- House Type -->
        <div class="mb-3">
            <select class="form-control" name="housetype" required>
                <option value="Building">Building</option>
                <option value="Other">Other</option>
            </select>
        </div>

        <!-- District -->
        <div class="mb-3">
            <input type="text" class="form-control" name="district" placeholder="District" required>
        </div>

        <button type="submit" class="btn btn-primary ">Predict</button>

    </form>

    <!-- RESULT SECTION -->
    {% if result %}
        <div class="alert alert-info mt-4 text-center">
            <h4>{{ result }}</h4>
        </div>
    {% endif %}

</div>

</body>
</html>
